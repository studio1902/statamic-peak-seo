title: SEO Advanced
fields:
  -
    handle: seo_noindex
    field:
      options:
        default: Default
        index: Index
        noindex: Noindex
      type: button_group
      default: default
      icon: button_group
      instructions: 'Instruct crawlers not to index this entry. "Default" uses the global indexing setting for this collection or taxonomy. Also affects sitemap.xml inclusion.'
      instructions_position: below
      listable: hidden
      width: 50
      display: Indexing
      localizable: true
  -
    handle: seo_nofollow
    field:
      type: toggle
      instructions: 'Instruct crawlers not to follow links on this page.'
      instructions_position: below
      listable: hidden
      width: 50
      display: No-follow
      localizable: true
  -
    handle: seo_canonical_type
    field:
      options:
        entry: 'Current entry'
        current: 'Current domain'
        external: 'External domain'
      display: 'Canonical URL'
      type: button_group
      default: entry
      icon: button_group
      instructions: 'Where should the canonical URL for this entry point to.'
      listable: hidden
      localizable: true
  -
    handle: seo_canonical_current
    field: common.entry
    config:
      localizable: true
      listable: false
      display: 'Canonical URL'
      width: 66
      instructions: 'If this is an entry with duplicate content. Enter the original URL for this content.'
      validate:
        - 'required_if:seo_canonical_type,current'
      if:
        seo_canonical_type: 'equals current'
  -
    handle: seo_canonical_external
    field:
      input_type: url
      display: 'Canonical URL'
      type: text
      icon: text
      listable: false
      localizable: true
      validate:
        - 'required_if:seo_canonical_type,external'
      if:
        seo_canonical_type: 'equals external'
